<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>INF1007 — Gestion du décodeur (squelette FELIX)</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <header>
      <h1>Gestion du décodeur ( Felix )</h1>
    </header>

    <main>
      <section id="etat">
        <h2>État de votre décodeur</h2>
        <fieldset>
          <legend>Informations du décodeur</legend>
          <div id="etat-content">
            <p><strong>Adresse :</strong> </p>
            <p><strong>Statut :</strong> </p>
            <p><strong>Actif depuis :</strong> </p>
            <p><strong>Réinitialisé :</strong> </p>
          </div>
        </fieldset>
        <fieldset>
          <legend>Actions rapides</legend>
          <div id="actions-content">
            <button type="button">Redémarrer</button>
            <button type="button">Réinitialiser</button>
            <button type="button">Éteindre</button>
          </div>
        </fieldset>
      </section>

      <section id="Chaines">
         <h2>Chaînes</h2>
         <fieldset>
           <legend>Liste des chaines</legend>
           <div id="chaines-content">
 
             <ul>
               <li>Chaine 1</li>
               <li>Chaine 2</li>
               <li>Chaine 3</li>
             </ul>
           </div>
         </fieldset>
         <fieldset>
          <legend>Actions rapides</legend>
          <div id="actions-content">
            <button type="button">Ajouter une Chaine</button>
            <button type="button">Supprimer une Chaine</button>
          </div>
        </fieldset>

    </main>

    <footer>
        <p>&copy; 2026 INF1007 - Projet de session</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
